<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swiftal</title>
  <link rel="icon" type="image/png" href="server-icon.png" />
  <link rel="preload" href="fonts/press-start-2p.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body {
      justify-content: center;
      padding: 2.5rem 1rem 5rem;
    }

    .about-card {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0;
    }

    .skin-wrap {
      background: var(--panel-inner);
      border: 2px solid #000;
      border-bottom: none;
      box-shadow:
        inset 2px 2px 0 var(--bevel-light),
        inset -2px -2px 0 var(--bevel-dark);
      padding: 1rem 2.5rem 0;
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .skin-wrap img {
      height: 180px;
      width: auto;
      image-rendering: pixelated;
      display: block;
    }

    .about-body {
      background: var(--panel-bg);
      border: 2px solid #000;
      box-shadow:
        inset 2px 2px 0 var(--bevel-light),
        inset -2px -2px 0 var(--bevel-dark),
        4px 4px 0 #000;
      padding: 2.5rem 2rem 2rem;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .about-name {
      font-family: var(--font-pixel);
      font-size: 1rem;
      color: var(--mc-white);
      letter-spacing: 0.04em;
    }

    .mc-rule {
      width: 100%;
      height: 2px;
      background: linear-gradient(to right, transparent, #555, transparent);
      border: none;
      margin: 0;
    }

    .about-bio {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .about-bio-line {
      font-family: var(--font-pixel);
      font-size: 0.42rem;
      color: var(--mc-gray);
      line-height: 1.8;
      letter-spacing: 0.04em;
    }

    .about-bio-line .highlight {
      color: var(--mc-green);
    }

    .about-links {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      width: 100%;
    }

    .about-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      text-decoration: none;
      font-family: var(--font-pixel);
      font-size: 0.42rem;
      color: var(--mc-white);
      background: #3a3a3a;
      border: 2px solid #000;
      box-shadow:
        inset 1px 1px 0 rgba(255,255,255,.18),
        inset -1px -1px 0 rgba(0,0,0,.5);
      padding: 0.65rem 1rem;
      cursor: pointer;
      text-shadow: 1px 1px rgba(0,0,0,.8);
      transition: background 0.1s, color 0.1s;
    }

    .about-link:hover {
      background: #4a4a4a;
      color: var(--mc-yellow);
    }

    .about-link svg {
      flex-shrink: 0;
      fill: currentColor;
    }
  </style>
</head>
<body>

  <div class="about-card">

    <div class="skin-wrap">
      <img src="https://mc-heads.net/body/Swiftal" alt="Swiftal's Minecraft skin" />
    </div>

    <div class="about-body">
      <p class="about-name">Swiftal</p>

      <div class="mc-rule"></div>

      <div class="about-bio">
        <p class="about-bio-line">London CS student</p>
        <p class="about-bio-line"><span class="highlight">High Member</span> · na.scrims.network</p>
      </div>

      <div class="mc-rule"></div>

      <div class="about-links">
        <a class="about-link" href="https://www.youtube.com/@margischole" target="_blank" rel="noopener noreferrer">
          <svg width="14" height="14" viewBox="0 0 24 24"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.8zM9.7 15.5V8.5l6.3 3.5-6.3 3.5z"/></svg>
          YouTube
        </a>
      </div>
    </div>

  </div>

</body>
</html>
