<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScrimsTracker</title>
  <link rel="icon" type="image/png" href="server-icon.png" />
  <link rel="preload" href="fonts/press-start-2p.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="page-wrap">

    <header class="site-header">
      <img id="serverIcon" class="server-icon" src="server-icon.png" alt="Server icon" />
      <div class="header-text">
        <h1><span class="h1-red">Scrims</span><span class="h1-white">T</span><span class="h1-blue">racker</span></h1>
        <p class="byline">by <a href="https://www.youtube.com/@margischole" target="_blank" rel="noopener noreferrer">Swiftal</a></p>
      </div>
    </header>

    <div class="mc-panel" id="mainPanel">

      <!-- Status banner -->
      <div class="status-banner" id="statusBanner">
        <div class="status-pip" id="statusPip"></div>
        <span class="status-text" id="statusText">Checking...</span>
        <span class="version-badge hidden" id="versionBadge"></span>
        <span class="banner-server-addr">na.scrims.network</span>
      </div>

      <!-- Hero player count -->
      <div class="player-hero hidden" id="infoGrid">
        <span class="player-hero-label">Players Online</span>
        <span class="player-hero-count" id="playerCount">—</span>
      </div>

      <!-- MOTD -->
      <div class="info-cell hidden" id="motdCell" style="margin-bottom:1.2rem">
        <span class="info-label">MOTD</span>
        <span class="info-value motd-value" id="motdText"></span>
      </div>

      <!-- Player list -->
      <div id="playerSection" class="hidden">
        <div class="mc-rule"></div>
        <p class="section-heading">Online Players</p>
        <div class="player-grid" id="playerGrid"></div>
      </div>

      <!-- Footer -->
      <div class="panel-footer">
        <span class="last-updated" id="lastUpdated">Not yet loaded</span>
        <div class="refresh-controls">
          <span class="countdown-num" id="countdownNum">60</span>
          <span class="countdown-unit">s</span>
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <button class="mc-btn" id="refreshBtn">Refresh</button>
        </div>
      </div>

    </div>

    <!-- Graph panel -->
    <div class="mc-panel graph-panel">
      <p class="section-heading">Player Count History <span class="graph-sub">hourly avg · last 7 days</span></p>
      <div class="graph-wrap">
        <canvas id="graphCanvas"></canvas>
        <div class="graph-tooltip hidden" id="graphTooltip"></div>
      </div>
    </div>

  </div>

  <script src="js/app.js"></script>
</body>
</html>
