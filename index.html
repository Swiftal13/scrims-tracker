<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScrimsTracker</title>
  <link rel="icon" type="image/png" href="server-icon.png" />
  <link rel="preload" href="fonts/press-start-2p.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="page-wrap">

    <header class="site-header">
      <div class="header-icon-wrap">
        <img id="serverIcon" class="server-icon" src="server-icon.png" alt="Server icon" />
      </div>
      <div class="header-text">
        <h1><span class="h1-red">na.scrims</span><span class="h1-white">.</span><span class="h1-blue">network</span></h1>
        <p class="byline">
          by <a href="https://www.youtube.com/@margischole" target="_blank" rel="noopener noreferrer">Swiftal</a>
        </p>
      </div>
    </header>

    <div class="mc-panel" id="mainPanel">

      <!-- Status bar -->
      <div class="status-row">
        <div class="status-pip" id="statusPip"></div>
        <span class="status-text" id="statusText">Checking...</span>
        <span class="version-badge hidden" id="versionBadge"></span>
      </div>

      <!-- Player count + MOTD -->
      <div class="info-grid hidden" id="infoGrid">
        <div class="info-cell">
          <span class="info-label">Players</span>
          <span class="info-value" id="playerCount">—</span>
        </div>
        <div class="info-cell hidden" id="motdCell">
          <span class="info-label">MOTD</span>
          <span class="info-value motd-value" id="motdText"></span>
        </div>
      </div>

      <!-- Player list -->
      <div id="playerSection" class="hidden">
        <div class="mc-rule"></div>
        <p class="section-heading">Online Players</p>
        <div class="player-grid" id="playerGrid"></div>
      </div>

      <!-- Footer -->
      <div class="panel-footer">
        <span class="last-updated" id="lastUpdated">Not yet loaded</span>
        <div class="refresh-controls">
          <span class="countdown-num" id="countdownNum">60</span>
          <span class="countdown-unit">s</span>
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <button class="mc-btn" id="refreshBtn">Refresh</button>
        </div>
      </div>

    </div><!-- .mc-panel -->

    <!-- Graph panel -->
    <div class="mc-panel graph-panel">
      <p class="section-heading">Player Count History <span class="graph-sub">hourly avg · last 7 days</span></p>
      <div class="graph-wrap">
        <canvas id="graphCanvas"></canvas>
        <div class="graph-tooltip hidden" id="graphTooltip"></div>
      </div>
    </div>

  </div><!-- .page-wrap -->

  <script src="js/app.js"></script>
</body>
</html>
