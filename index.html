<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>na.scrims.network — Server Status</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="page-wrap">

    <header class="site-header">
      <div class="header-icon-wrap">
        <img id="serverIcon" class="server-icon hidden" alt="Server icon" />
        <div class="grass-block" id="iconFallback" aria-hidden="true">
          <div class="grass-top"></div>
          <div class="dirt-body"></div>
        </div>
      </div>
      <div class="header-text">
        <h1>na.scrims.network</h1>
        <p class="byline">
          by <a href="https://www.youtube.com/@margischole" target="_blank" rel="noopener noreferrer">Swiftal</a>
        </p>
      </div>
    </header>

    <div class="mc-panel" id="mainPanel">

      <!-- Status bar -->
      <div class="status-row">
        <div class="status-pip" id="statusPip"></div>
        <span class="status-text" id="statusText">Checking...</span>
      </div>

      <!-- Player count + MOTD -->
      <div class="info-grid hidden" id="infoGrid">
        <div class="info-cell">
          <span class="info-label">Players</span>
          <span class="info-value" id="playerCount">—</span>
        </div>
        <div class="info-cell hidden" id="motdCell">
          <span class="info-label">MOTD</span>
          <span class="info-value motd-value" id="motdText"></span>
        </div>
      </div>

      <!-- Player list -->
      <div id="playerSection" class="hidden">
        <div class="mc-rule"></div>
        <p class="section-heading">Online Players</p>
        <div class="player-grid" id="playerGrid"></div>
      </div>

      <!-- Footer -->
      <div class="panel-footer">
        <span class="last-updated" id="lastUpdated">Not yet loaded</span>
        <div class="refresh-controls">
          <span class="countdown-num" id="countdownNum">60</span>
          <span class="countdown-unit">s</span>
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <button class="mc-btn" id="refreshBtn">Refresh</button>
        </div>
      </div>

    </div><!-- .mc-panel -->

  </div><!-- .page-wrap -->

  <script src="js/app.js"></script>
</body>
</html>
